{{- if eq (hugo.Environment) "production" -}}
<script data-goatcounter="https://newtoken.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.gc-count[data-gc-path]').forEach(function (el) {
    var path = el.getAttribute('data-gc-path').replace(/\/$/, '');
    fetch('https://newtoken.goatcounter.com/counter' + path + '.txt')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var count = text.trim();
        el.textContent = count + ' views';
      })
      .catch(function () { el.remove(); });
  });
});
</script>
{{- end -}}
